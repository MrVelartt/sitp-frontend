@let isSharing = isSharingLocation(); @let color = locationSharingColor();
<ion-item
  lines="none"
  class="border-radius-secondary mb-4"
  [class]="isSharing ? 'bg-light-octonary' : 'bg-light-septenary'"
>
  <ion-icon name="sharing" size="small" [color]="color" class="me-2"></ion-icon>
  <ion-toggle
    [checked]="checked()"
    [color]="color"
    class="toggle-style-2 fw-bold"
    [class]="'text-' + color"
    (ionChange)="toggleLocationSharing($event)"
  >
    {{
      isSharing
        ? "Compartir ubicación está activado"
        : "Compartir ubicación está desactivado"
    }}
  </ion-toggle>
</ion-item>

<app-main-button
  [label]="isSharing ? 'Dejar de compartir' : 'Empezar a compartir'"
  iconName="navigate"
  (clickChange)="sharingLocation()"
></app-main-button>
