<ion-item
  lines="none"
  class="bg-quinary no-padding px-2 py-3 border-radius-secondary"
>
  <div class="w-100">
    <ion-label>
      <p class="mb-3 text-primary fs-5">Visualización</p>
    </ion-label>
    <div class="w-100 d-flex align-items-center column-gap-3">
      <ion-icon name="moon" color="primary" class="icon fs-3"></ion-icon>
      <ion-toggle
        [checked]="false"
        class="text-secondary toggle-style-1 fs-6"
        color="primary"
      >
        Modo oscuro
      </ion-toggle>
    </div>
  </div>
</ion-item>
