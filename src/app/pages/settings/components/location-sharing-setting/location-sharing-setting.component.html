<ion-item
  lines="none"
  class="bg-quinary no-padding px-2 py-3 border-radius-secondary"
>
  <div class="w-100">
    <ion-label>
      <p class="mb-3 text-primary fs-5">Comparte tu ubicación</p>
    </ion-label>
    <div class="w-100 d-flex align-items-center column-gap-3">
      <ion-icon name="location" color="primary" class="icon fs-3"></ion-icon>
      <ion-button class="button-style-3 text-none fs-6 ion-no-padding w-100">
        Seguimiento en tiempo real
        <ion-icon
          slot="end"
          name="chevron-forward-outline"
          class="ms-auto pe-2"
        ></ion-icon>
      </ion-button>
    </div>
  </div>
</ion-item>
