<ion-header [translucent]="true">
  <ion-toolbar class="bg-header pt-4">
    <ion-title>
      <h1 class="text-primary text-center fs-2 fw-semibold my-0 mb-3">
        Lista de rutas
      </h1>
    </ion-title>
    <div class="search px-3 pb-3">
      <app-item-search (searchChange)="searchRoute($event)" />
    </div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="position-relative bg-octonary">
  <ion-header collapse="condense">
    <ion-toolbar class="bg-header">
      <ion-title>
        <h1 class="text-primary text-center fs-2 fw-bold">Lista de rutas</h1>
      </ion-title>
      <div class="search">
        <app-item-search (searchChange)="searchRoute($event)" />
      </div>
    </ion-toolbar>
  </ion-header>

  <ion-grid style="padding-bottom: 65px">
    <ion-row>
      <ion-col size="12">
        <ion-list class="p-0 bg-octonary">
          @for (route of filteredRoutes(); track route.id) { @defer(on viewport)
          {
          <div class="content-card mb-3">
            <app-route-card
              [route]="route"
              (seeRouteChange)="navigateToMapWithRoute($event)"
              (seeDetailRouteChange)="navigateToRouteDetail($event)"
            />
          </div>
          } @placeholder {
          <p>...Cargando</p>
          } }
        </ion-list>
      </ion-col>
    </ion-row>

    <ion-row
      class="position-fixed start-0 bottom-0 w-100 px-1 py-2 bg-octonary"
    >
      <ion-col>
        <app-main-button
          label="Ver todas las rutas en el mapa"
          iconName="map"
          (clickChange)="navigateToMap()"
        />
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
