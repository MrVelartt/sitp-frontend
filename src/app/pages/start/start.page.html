@let infoLocal = infoStart();
<ion-content [fullscreen]="true" class="bg-start">
  <ion-grid>
    <ion-row>
      <ion-col size="12">
        <ion-thumbnail>
          <ion-icon name="logo" color="primary" />
        </ion-thumbnail>
      </ion-col>
      <ion-col size="12">
        <ion-title>
          <h1>{{ infoLocal.title }}</h1>
        </ion-title>
        <ion-text>
          <p class="mb-0">{{ infoLocal.description }}</p>
        </ion-text>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
