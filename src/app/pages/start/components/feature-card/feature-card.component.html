@let featureLocal = feature();
<ion-item
  class="feature d-flex bg-quinary border-radius-primary mb-2"
  lines="none"
>
  <ion-thumbnail class="content-icon item-style-1 rounded-circle me-3">
    <ion-icon class="icon" size="small" [name]="featureLocal.icon"></ion-icon>
  </ion-thumbnail>
  <ion-label class="overflow-hidden">
    <h2 class="color-primary fw-bold fs-7 text-lines-1">
      {{ featureLocal.title }}
    </h2>
    <p class="color-secondary fs-8 text-lines-2 mb-0">
      {{ featureLocal.description }}
    </p>
  </ion-label>
</ion-item>
