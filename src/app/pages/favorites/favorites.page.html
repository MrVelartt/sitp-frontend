<ion-header [translucent]="true">
  <ion-toolbar class="bg-header pt-4">
    <div class="d-flex align-items-center position-relative">
      <ion-buttons slot="start">
        <ion-back-button
          class="text-primary"
          defaultHref="/home"
        ></ion-back-button>
      </ion-buttons>

      <ion-title class="title-center">
        <h1 class="text-primary fs-2 fw-semibold m-0">
          Lista de rutas favoritas
        </h1>
      </ion-title>
    </div>
    <div class="search px-3 pb-3 mt-3">
      <app-item-search (searchChange)="searchRoute($event)" />
    </div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="position-relative bg-octonary">
  <ion-header collapse="condense">
    <ion-toolbar class="bg-header">
      <div class="d-flex align-items-center position-relative">
        <ion-buttons slot="start">
          <ion-back-button
            class="text-primary"
            defaultHref="/home"
          ></ion-back-button>
        </ion-buttons>

        <ion-title class="title-center">
          <h1 class="text-primary title-center fs-2 fw-semibold m-0">
            Lista de rutas favoritas
          </h1>
        </ion-title>
      </div>
      <div class="search px-3 pb-3 mt-3">
        <app-item-search (searchChange)="searchRoute($event)" />
      </div>
    </ion-toolbar>
  </ion-header>

  <ion-grid style="padding-bottom: 65px">
    <ion-row>
      <ion-col size="12">
        <ion-list class="p-0 bg-octonary">
          @for (route of filteredRoutes(); track route.id) { @defer(on viewport)
          {
          <div class="content-card mb-3">
            <app-route-card
              [route]="route"
              (seeRouteChange)="navigateToMapWithRoute($event)"
              (seeDetailRouteChange)="navigateToRouteDetail($event)"
              (favoriteChange)="deleteFavorite($event)"
            />
          </div>
          } @placeholder {
          <p>...Cargando</p>
          } } @empty {
          <p class="text-primary">No tiene rutas agregadas en favoritos</p>
          }
        </ion-list>
      </ion-col>
    </ion-row>

    @if (this.routes().length) {
    <ion-row
      class="position-fixed start-0 bottom-0 w-100 px-1 py-2 bg-octonary"
    >
      <ion-col>
        <app-main-button
          label="Ver todas las rutas en el mapa"
          iconName="map"
          (clickChange)="navigateToMapWithRoutes()"
        />
      </ion-col>
    </ion-row>
    }
  </ion-grid>
</ion-content>
