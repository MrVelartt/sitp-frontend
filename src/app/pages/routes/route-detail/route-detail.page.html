<ion-header [translucent]="true">
  <ion-toolbar class="bg-header d-flex align-items-center">
    <ion-title class="title-center">
      <h1 class="color-primary fs-2 fw-semibold m-0">Detalle de la ruta</h1>
    </ion-title>

    <ion-buttons slot="start">
      <ion-back-button
        class="color-primary"
        defaultHref="/routes"
      ></ion-back-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">
        <h1 class="color-primary text-center fs-2 fw-bold">
          Detalle de la ruta
        </h1>
      </ion-title>
    </ion-toolbar>
  </ion-header>
</ion-content>
