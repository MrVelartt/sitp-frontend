<ion-grid class="p-0">
  <ion-row>
    <ion-col
      size="12"
      class="p-0 d-flex align-items-center justify-content-between mb-2"
    >
      <ion-text class="fs-6 text-primary fw-bold">Búsquedas recientes</ion-text>
    </ion-col>

    <ion-col size="12" class="p-0 d-flex flex-column gap-2">
      @for (route of recentRoutes(); track route.id) {
        <ion-item
          class="no-padding bg-transparent bg-octonary border-radius-primary"
          lines="none"
          (click)="navigateToDetailRoute(route.id)"
        >
          <div class="p-2 d-flex align-items-center">
            <span
              class="icon-route d-flex justify-content-center align-items-center border-radius-secondary fw-semibold rounded-circle fs-8 me-2"
              [ngStyle]="{
                color: route.color,
                background: convertHexToRgba(route.color, 0.2),
              }"
            >
              {{ route.shortName }}
            </span>
            <ion-text class="">
              <p class="mb-0 text-primary fs-8 fw-bold">
                {{ route.name | capitalize }}
              </p>
              <p class="mb-0 text-tertiary fs-9">
                Cada {{ route.frequency }} minutos
              </p>
            </ion-text>
          </div>
        </ion-item>
      }
    </ion-col>
  </ion-row>
</ion-grid>
