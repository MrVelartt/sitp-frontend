<ion-grid class="p-0">
  <ion-row>
    <ion-col
      size="12"
      class="p-0 d-flex align-items-center justify-content-between mb-2"
    >
      <ion-text class="fs-6 text-primary fw-bold">Mis rutas favoritas</ion-text>
      <ion-button
        class="button-style-2 text-primary text-transform-none fw-bold text-decoration-underline"
        (click)="navigateToFavorites()"
      >
        Ver todas
      </ion-button>
    </ion-col>

    <ion-col size="12" class="p-0">
      <app-carousel-favorites
        [favorites]="favorites()"
        (favoriteChange)="navigateToDetailRoute($event)"
      />
    </ion-col>
  </ion-row>
</ion-grid>
