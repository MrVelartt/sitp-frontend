<ion-header [translucent]="true" class="shadow-none">
  <ion-toolbar class="bg-header pt-4 text-primary px-3 pb-2">
    <ion-title class="p-0">
      <h1 class="mb-0 fw-bold">{{ greetingMessage() }}</h1>
    </ion-title>
    <ion-text class="text-secondary">¿A dónde se dirige hoy?</ion-text>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="bg-quinary">
  <ion-header collapse="condense">
    <ion-toolbar class="bg-header text-primary px-3 pb-2">
      <ion-title class="p-0">
        <h1 class="mb-0 fw-bold">{{ greetingMessage() }}</h1>
      </ion-title>
      <ion-text class="text-secondary">¿A dónde se dirige hoy?</ion-text>
    </ion-toolbar>
  </ion-header>

  <ion-grid class="mt-3">
    <ion-row class="mb-3">
      <ion-col size="12">
        <div class="search">
          <app-item-search
            placeholder="Buscar rutas o paradas"
            (clickChange)="navigateToPage('/routes')"
          />
        </div>
      </ion-col>
    </ion-row>

    <ion-row class="mb-3">
      <ion-col size="6">
        <app-home-item-button
          title="Ver todas las rutas"
          description="Mapa disponible"
          icon="routes"
          backgroundColor="#263cd1"
          (clickChange)="navigateToMap()"
        />
      </ion-col>
      <ion-col size="6">
        <app-home-item-button
          title="Seguir mi autobús"
          description="Seguimiento en tiempo real"
          icon="bus"
          backgroundColor="#10B981"
          (clickChange)="navigateToPage('/map')"
        />
      </ion-col>
      <ion-col size="6">
        <app-home-item-button
          title="Favoritos"
          description="Tus rutas guardadas"
          icon="star-round"
          backgroundColor="#8B5CF6"
          (clickChange)="navigateToPage('/favorites')"
        />
      </ion-col>
      <ion-col size="6">
        <app-home-item-button
          title="Paradas cercanas"
          description="Buscar paradas más cercanas"
          icon="location"
          backgroundColor="#F97316"
          (clickChange)="navigateToPage('/map')"
        />
      </ion-col>
    </ion-row>

    @if(favorites().length) {
    <ion-row>
      <ion-col size="12">
        <app-home-favorites [favorites]="favorites()" />
      </ion-col>
    </ion-row>
    } @if(recentRoutes().length) {
    <ion-row class="mt-3">
      <ion-col size="12">
        <app-home-recent-routes [recentRoutes]="recentRoutes()" />
      </ion-col>
    </ion-row>
    }
  </ion-grid>
</ion-content>
