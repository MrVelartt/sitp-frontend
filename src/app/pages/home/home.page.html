<ion-header [translucent]="true" class="shadow-none">
  <ion-toolbar class="home-toolbar px-3 pb-3 pt-3">
    <ion-title class="p-0">
      <div class="vivo-header">
        <span class="vivo-logo text-gradient-gold">VIVO</span>
        <span class="vivo-tagline">Villavo Inteligente · Vías y Orígenes</span>
      </div>
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="home-content">

  <ion-grid class="mt-3">
    <ion-row class="mb-3">
      <ion-col size="12">
        <app-item-search
          placeholder="Buscar rutas o paradas"
          (clickChange)="navigateToPage('/routes')"
        />
      </ion-col>
    </ion-row>

    <ion-row class="mb-3">
      <ion-col size="6" class="anim-fade-up anim-delay-1">
        <app-home-item-button
          title="Ver todas las rutas"
          description="Mapa disponible"
          icon="routes"
          backgroundColor="#C9A227"
          textColor="#15171A"
          (clickChange)="navigateToMap()"
        />
      </ion-col>
      <ion-col size="6" class="anim-fade-up anim-delay-2" style="position: relative">
        <app-home-item-button
          title="Seguir mi autobús"
          description="Tiempo real"
          icon="bus"
          backgroundColor="#0F4C44"
          (clickChange)="navigateToPage('/map')"
        />
        <span class="live-dot"></span>
      </ion-col>
      <ion-col size="6" class="anim-fade-up anim-delay-3">
        <app-home-item-button
          title="Favoritos"
          description="Rutas guardadas"
          icon="star-round"
          backgroundColor="#6E1423"
          (clickChange)="navigateToPage('/favorites')"
        />
      </ion-col>
      <ion-col size="6" class="anim-fade-up anim-delay-4">
        <app-home-item-button
          title="Paradas cercanas"
          description="Buscar paradas"
          icon="location"
          backgroundColor="#1B3A4B"
          (clickChange)="navigateToPage('/map')"
        />
      </ion-col>
    </ion-row>

    @if(favorites().length) {
      <ion-row>
        <ion-col size="12">
          <app-home-favorites [favorites]="favorites()" />
        </ion-col>
      </ion-row>
    }

    <ion-row>
      <ion-col size="12">
        <app-home-coming-soon />
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
