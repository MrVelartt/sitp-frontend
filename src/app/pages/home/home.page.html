<ion-header [translucent]="true" class="shadow-none">
  <ion-toolbar class="home-toolbar pt-4 px-3 pb-2">
    <ion-title class="p-0">
      <h1 class="mb-0 fw-bold text-primary">{{ greetingMessage() }}</h1>
    </ion-title>
    <ion-text class="text-tertiary">¿A dónde se dirige hoy?</ion-text>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="home-content">
  <ion-header collapse="condense">
    <ion-toolbar class="home-toolbar px-3 pb-2">
      <ion-title class="p-0">
        <h1 class="mb-0 fw-bold text-primary">{{ greetingMessage() }}</h1>
      </ion-title>
      <ion-text class="text-tertiary">¿A dónde se dirige hoy?</ion-text>
    </ion-toolbar>
  </ion-header>

  <ion-grid class="mt-3">
    <ion-row class="mb-3">
      <ion-col size="12">
        <app-item-search
          placeholder="Buscar rutas o paradas"
          (clickChange)="navigateToPage('/routes')"
        />
      </ion-col>
    </ion-row>

    <ion-row class="mb-3">
      <ion-col size="6" class="anim-fade-up anim-delay-1">
        <app-home-item-button
          title="Ver todas las rutas"
          description="Mapa disponible"
          icon="routes"
          backgroundColor="#1B3A4B"
          (clickChange)="navigateToMap()"
        />
      </ion-col>
      <ion-col size="6" class="anim-fade-up anim-delay-2">
        <app-home-item-button
          title="Seguir mi autobús"
          description="Tiempo real"
          icon="bus"
          backgroundColor="#0F4C44"
          (clickChange)="navigateToPage('/map')"
        />
      </ion-col>
      <ion-col size="6" class="anim-fade-up anim-delay-3">
        <app-home-item-button
          title="Favoritos"
          description="Rutas guardadas"
          icon="star-round"
          backgroundColor="#6E1423"
          (clickChange)="navigateToPage('/favorites')"
        />
      </ion-col>
      <ion-col size="6" class="anim-fade-up anim-delay-4">
        <app-home-item-button
          title="Paradas cercanas"
          description="Buscar paradas"
          icon="location"
          backgroundColor="#1B3A4B"
          (clickChange)="navigateToPage('/map')"
        />
      </ion-col>
    </ion-row>

    @if(favorites().length) {
      <ion-row>
        <ion-col size="12">
          <app-home-favorites [favorites]="favorites()" />
        </ion-col>
      </ion-row>
    }

    @if(recentRoutes().length) {
      <ion-row class="my-2">
        <ion-col size="12">
          <app-home-recent-routes [recentRoutes]="recentRoutes()" />
        </ion-col>
      </ion-row>
    }

    <ion-row>
      <ion-col size="12">
        <app-home-coming-soon />
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
