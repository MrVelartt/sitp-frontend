<ion-header [translucent]="true">
  <ion-toolbar class="bg-header">
    <div class="search px-3 py-2">
      <app-item-search
        placeholder="Buscar ruta"
        (clickChange)="navigateToListRoutes()"
      ></app-item-search>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="bg-octonary">
  <ion-header collapse="condense">
    <ion-toolbar class="bg-header">
      <div class="search px-3 pb-3">
        <app-item-search></app-item-search>
      </div>
    </ion-toolbar>
  </ion-header>

  <ion-grid class="p-0 h-100 position-relative">
    <ion-row class="h-100">
      <ion-col size="12" class="p-0 h-100">
        <google-map
          width="100%"
          height="100%"
          [center]="center"
          [zoom]="zoom"
          (mapClick)="moveMap($event)"
          (mapMousemove)="move($event)"
        />
      </ion-col>
    </ion-row>

    <ion-row class="filters position-absolute start-0 w-100 bottom-0">
      <ion-col size="12" class="p-0">
        <ion-toolbar class="bg-transparent">
          <ion-buttons slot="start">
            <ion-button class="button-style-2">
              <ion-icon name="locate" color="primary"></ion-icon>
            </ion-button>
          </ion-buttons>
          <ion-buttons slot="end">
            <ion-button class="button-style-2">
              <ion-icon name="filter" color="primary"></ion-icon>
            </ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
