@let featureLocal = feature();
<ion-item
  class="feature d-flex bg-quinary border-radius-primary ion-no-padding"
  lines="none"
>
  <ion-icon class="icon me-2 fs-5" color="primary" [name]="featureLocal.icon" />
  <ion-label class="overflow-hidden">
    <h2 class="text-primary fw-bold fs-9 text-lines-1">
      {{ featureLocal.title }}
    </h2>
    <p class="text-secondary fs-9 text-lines-2 mb-0">
      {{ featureLocal.description }}
    </p>
  </ion-label>
</ion-item>
