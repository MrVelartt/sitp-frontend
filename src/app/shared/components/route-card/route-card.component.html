@let routeLocal = route();
@let ac = accent;

<div
  class="route-card pressable anim-fade-up"
  [style.border-top-color]="ac.border"
  (click)="seeDetailRoute($event)"
>
  <!-- Header -->
  <div class="rc-header">
    <span
      class="rc-badge"
      [ngStyle]="{ background: ac.border, color: '#15171A' }"
    >
      {{ routeLocal.shortName }}
    </span>

    <div class="rc-title-wrap">
      <p class="rc-name">{{ routeLocal.name }}</p>
      <p class="rc-freq">Cada {{ routeLocal.frequency }} min</p>
    </div>

    <button class="rc-fav-btn" (click)="favorite($event)">
      <ion-icon
        [name]="routeLocal.isFavorite ? 'star-round' : 'star-round-outline'"
        [class]="routeLocal.isFavorite ? 'color-favorite-active' : 'color-favorite'"
      ></ion-icon>
    </button>
  </div>

  <!-- Descripción -->
  <p class="rc-desc text-lines-3">{{ routeLocal.description }}</p>

  <!-- Botón -->
  <button
    class="rc-cta pressable"
    [ngStyle]="{ background: ac.border, color: '#15171A' }"
    (click)="seeRoute($event)"
  >
    Ver ruta
    <ion-icon name="arrow-forward-outline"></ion-icon>
  </button>
</div>
